name: Feature
description: Story produit — fonctionnalité à implémenter
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: "Lier cette issue à la spec Notion validée avant de commencer l'implémentation."

  - type: textarea
    id: contexte
    attributes:
      label: Contexte / problème
      description: Quel problème utilisateur cette feature résout-elle ?
      placeholder: "En tant qu'artisan, je ne peux pas… ce qui me fait perdre du temps car…"
    validations:
      required: true

  - type: input
    id: spec_notion
    attributes:
      label: Spec Notion (URL)
      description: Lien vers la page Notion de spec validée
      placeholder: "https://notion.so/…"
    validations:
      required: false

  - type: textarea
    id: criteres
    attributes:
      label: Critères d'acceptation
      description: Liste des conditions mesurables pour marquer la feature comme terminée
      placeholder: |
        - [ ] L'artisan peut créer un chantier depuis l'écran principal
        - [ ] Le chantier apparaît dans la liste après création
        - [ ] L'action fonctionne hors ligne (Phase 3)
    validations:
      required: true

  - type: dropdown
    id: apps
    attributes:
      label: App(s) concernée(s)
      multiple: true
      options:
        - API (Symfony)
        - Web (React)
        - Mobile (Expo)
        - Infra / CI
    validations:
      required: true

  - type: input
    id: bounded_context
    attributes:
      label: Bounded context
      placeholder: "chantier | client | auth | photo | devis | metre-ar"
    validations:
      required: false

  - type: textarea
    id: dev_notes
    attributes:
      label: Dev Notes
      description: Contexte technique self-contained pour implémenter sans relire Notion et 5 ADRs. Patterns archi, fichiers à toucher, standards de test.
      placeholder: |
        **Patterns archi à respecter** :
        - Bounded context : <ex. chantier> — mode rigoureux (cf ADR 0002, ADR 0010)
        - VO partagés : <ex. Adresse depuis Shared/ValueObject>

        **Fichiers à créer / modifier** :
        - apps/api/src/Domain/Chantier/...
        - apps/web/src/features/chantiers/...

        **Tests prévus** :
        - Domain : unitaires sans DB
        - Use cases : intégration avec DB (Foundry + WebTestCase)
        - API : intégration HTTP
    validations:
      required: false

  - type: textarea
    id: securite_rgpd
    attributes:
      label: Impact sécurité / RGPD
      description: Cocher ce qui s'applique. Si au moins une case est cochée → /security-review obligatoire avant merge. Si "données personnelles" → ADR 0015 (RGPD) à consulter quand il existera.
      placeholder: |
        - [ ] Manipule des données personnelles (nom, email, téléphone, adresse, photo identifiable, géoloc, IP)
        - [ ] Touche à l'authentification, aux sessions, ou aux tokens
        - [ ] Touche à des permissions / RBAC / ownership
        - [ ] Manipule des secrets (clés API, credentials, JWT keys)
        - [ ] Upload / stockage / téléchargement de fichiers
        - [ ] Manipule des données financières (devis, facture, paiement, TVA)
        - [ ] Ajoute une dépendance externe (lib, MCP, API tierce, sous-traitant RGPD)
        - [ ] Aucune des cases ci-dessus
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: Références
      description: Citations précises avec source path. Évite de remettre tout le contexte en mémoire à chaque session.
      placeholder: |
        - [Source: docs/adr/0002-architecture-hexagonale.md#Decision]
        - [Source: docs/adr/0011-clientref-value-object-denormalise.md]
        - [Source: apps/api/src/Domain/Chantier/Entity/Chantier.php:24-58]
        - [Source: docs/THESAURUS.md#Chantier]
    validations:
      required: false

  - type: textarea
    id: learnings
    attributes:
      label: Learnings (à remplir en fin de story)
      description: Ce que cette story a appris pour la suivante. Patterns émergents, pièges évités, points à refactor. Lu en début de la story suivante du même bounded context.
      placeholder: |
        - Pattern qui a marché : ...
        - Piège évité : ...
        - À refactor avant la prochaine story : ...
        - Nouveau ADR à écrire ? : ...
    validations:
      required: false
