name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: ci / api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: cordeau
          POSTGRES_PASSWORD: cordeau
          POSTGRES_DB: cordeau_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U cordeau -d cordeau_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo_pgsql, redis, intl, mbstring
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: apps/api/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --no-progress --error-format=github
        env:
          APP_ENV: dev

      - name: Run Deptrac (architecture hexagonale)
        run: ./vendor/bin/deptrac analyse --no-progress --formatter=github-actions

      - name: Run PHPUnit
        run: php bin/phpunit
        env:
          # DB nommée "cordeau" → Doctrine ajoute _test en mode test → "cordeau_test" (créée par le service)
          DATABASE_URL: postgresql://cordeau:cordeau@localhost:5432/cordeau?serverVersion=18&charset=utf8
          APP_SECRET: ci_secret_for_tests

  web:
    name: ci / web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @cordeau/web exec playwright install --with-deps chromium
        timeout-minutes: 5

      - name: Lint
        run: pnpm --filter @cordeau/web lint

      - name: Test
        run: pnpm --filter @cordeau/web test

      - name: Build
        run: pnpm --filter @cordeau/web build

  mobile:
    name: ci / mobile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @cordeau/mobile lint

      - name: Test
        run: pnpm --filter @cordeau/mobile test

      - name: Build check
        run: pnpm --filter @cordeau/mobile build

  deploy-api:
    name: deploy / api
    needs: api
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --config fly.toml
        working-directory: apps/api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    name: deploy / web
    needs: web
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @cordeau/web build
        env:
          VITE_API_URL: https://cordeau-api.fly.dev
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy apps/web/dist --project-name cordeau-web --branch main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  ci-pass:
    name: ci / pass
    needs: [api, web, mobile]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all required jobs passed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
