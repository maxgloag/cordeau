name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Moindre privilège par défaut (cf ADR 0019). Élargir par job si nécessaire.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # On annule les runs superflus uniquement sur les PR.
  # Sur main, les runs se mettent en file (jamais annulés) pour ne pas
  # interrompre un déploiement / une migration en cours.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  format:
    name: ci / format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

  audit:
    name: ci / audit deps (js)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Non bloquant au départ : remonte les CVE sans casser les PR sur des
      # advisories transitives (à durcir une fois le bruit maîtrisé — ADR 0019).
      - name: pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  api:
    name: ci / api
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: cordeau
          POSTGRES_PASSWORD: cordeau
          POSTGRES_DB: cordeau_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U cordeau -d cordeau_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: "8.5"
          extensions: pdo_pgsql, redis, intl, mbstring
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: apps/api/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Audit Composer dependencies
        run: composer audit

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --no-progress --error-format=github
        env:
          APP_ENV: dev

      - name: Run Deptrac (architecture hexagonale)
        run: ./vendor/bin/deptrac analyse --no-progress --formatter=github-actions

      - name: Run PHPUnit
        run: php bin/phpunit
        env:
          # DB nommée "cordeau" → Doctrine ajoute _test en mode test → "cordeau_test" (créée par le service)
          DATABASE_URL: postgresql://cordeau:cordeau@localhost:5432/cordeau?serverVersion=18&charset=utf8
          APP_SECRET: ci_secret_for_tests

  web:
    name: ci / web
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      # Mémoïsation des tâches Turbo entre runs (lint/test/build).
      # Une PR qui ne touche pas le web rejoue le cache → job quasi instantané.
      - name: Cache Turbo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-web-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-web-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Chrome for Testing depuis le CDN Google (évite cdn.playwright.dev instable)
      - name: Setup Chrome for Testing
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2
        id: setup-chrome

      - name: Lint
        run: pnpm exec turbo run lint --filter=@cordeau/web

      # Test en appel direct (pas via Turbo) : le mode strict de Turbo filtrerait
      # les variables PLAYWRIGHT_* qui ne sont pas déclarées dans turbo.json.
      - name: Test
        run: pnpm --filter @cordeau/web test
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Build
        run: pnpm exec turbo run build --filter=@cordeau/web

  mobile:
    name: ci / mobile
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-mobile-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-mobile-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec turbo run lint --filter=@cordeau/mobile

      - name: Test
        run: pnpm exec turbo run test --filter=@cordeau/mobile

      # Vrai bundling Metro (attrape erreurs de plugins natifs / transformers
      # babel / résolution de modules que tsc + jest ne voient pas — ADR 0019).
      - name: Bundle check (expo export)
        run: pnpm --filter @cordeau/mobile exec expo export --platform ios --output-dir "$RUNNER_TEMP/expo-export"

  deploy-api:
    name: deploy / api
    needs: [ci-pass]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Sérialise les déploiements API et n'annule jamais un deploy en cours
    # (protège le release_command de migration — ADR 0019).
    concurrency:
      group: deploy-api
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --config fly.toml
        working-directory: apps/api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    name: deploy / web
    needs: [ci-pass]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-web
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @cordeau/web build
        env:
          VITE_API_URL: https://cordeau-api.fly.dev
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy apps/web/dist --project-name cordeau-web --branch main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  ci-pass:
    name: ci / pass
    needs: [format, audit, api, web, mobile]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check all required jobs passed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
