name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Force les actions GitHub (checkout, setup-node, cache...) à tourner
# sur Node.js 24 au lieu de la version 20 dépréciée
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  api:
    name: ci / api
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: cordeau
          POSTGRES_PASSWORD: cordeau
          POSTGRES_DB: cordeau_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U cordeau -d cordeau_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo_pgsql, redis, intl, mbstring
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
        working-directory: apps/api

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --no-progress --error-format=github
        working-directory: apps/api
        env:
          APP_ENV: dev
          # DB nommée "cordeau" → Doctrine ajoute _test en mode test → "cordeau_test" (créée par le service)
          DATABASE_URL: postgresql://cordeau:cordeau@localhost:5432/cordeau?serverVersion=18&charset=utf8
          APP_SECRET: ci_secret_for_tests

      - name: Run PHPUnit
        run: php bin/phpunit
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://cordeau:cordeau@localhost:5432/cordeau?serverVersion=18&charset=utf8
          APP_SECRET: ci_secret_for_tests

  web:
    name: ci / web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @cordeau/web exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm --filter @cordeau/web lint

      - name: Test
        run: pnpm --filter @cordeau/web test

      - name: Build
        run: pnpm --filter @cordeau/web build

  mobile:
    name: ci / mobile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @cordeau/mobile lint

      - name: Test
        run: pnpm --filter @cordeau/mobile test

      - name: Build check
        run: pnpm --filter @cordeau/mobile build
