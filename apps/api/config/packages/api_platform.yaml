api_platform:
    title: Cordeau API
    version: 1.0.0
    enable_swagger_ui: true
    docs_formats:
        jsonopenapi: ["application/vnd.openapi+json"]
        html: ["text/html"]
    defaults:
        stateless: false
        cache_headers:
            vary: ["Content-Type", "Authorization", "Origin"]
    formats:
        json: ["application/json"]
        jsonld: ["application/ld+json"]
    patch_formats:
        json: ["application/merge-patch+json"]
    exception_to_status:
        App\Domain\Chantier\Exception\ChantierIntrouvableException: 404

when@prod:
    api_platform:
        enable_swagger_ui: false
        docs_formats:
            jsonopenapi: ["application/vnd.openapi+json"]
