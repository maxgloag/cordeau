nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['%env(CORS_ALLOW_ORIGIN)%']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization', 'X-Client-Type', 'X-Device-Info']
        expose_headers: []
        max_age: 3600
        allow_credentials: true
    paths:
        '^/': ~
