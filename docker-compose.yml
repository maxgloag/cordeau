# Infra dev : Postgres + Redis (PHP géré par Symfony CLI — voir docs/ENV-SETUP.md).
services:
  postgres:
    image: postgres:18-alpine
    container_name: cordeau_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cordeau}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cordeau}
      POSTGRES_DB: ${POSTGRES_DB:-cordeau}
    volumes:
      - cordeau_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cordeau} -d ${POSTGRES_DB:-cordeau}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: cordeau_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - cordeau_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cordeau_pg_data:
  cordeau_redis_data:
